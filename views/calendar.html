<div class="p-6 max-w-screen-2xl mx-auto flex flex-col h-full overflow-hidden">
  <!-- Calendar Header -->
  <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-zinc-100" id="cal-title">
            Calendar
        </h1>
        <p class="text-base text-muted mt-2">
            Schedule deep work and manage your time blocks.
        </p>
    </div>

    <div class="flex items-center gap-4">
        <!-- Navigation -->
        <div class="flex items-center bg-card border border-border rounded-lg p-1">
            <button class="p-2 hover:bg-white/5 rounded-md text-muted hover:text-white transition-colors" id="cal-prev">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="px-4 py-1.5 text-xs font-bold text-zinc-300 hover:text-white" id="cal-today">Today</button>
            <button class="p-2 hover:bg-white/5 rounded-md text-muted hover:text-white transition-colors" id="cal-next">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>

        <!-- View Tabs -->
        <div class="flex items-center bg-card border border-border rounded-lg p-1">
            <button class="cal-tab active px-4 py-1.5 text-xs font-bold rounded-md transition-all text-muted hover:text-white active:bg-white active:text-zinc-950" data-view="month">Month</button>
            <button class="cal-tab px-4 py-1.5 text-xs font-bold rounded-md transition-all text-muted hover:text-white active:bg-white active:text-zinc-950" data-view="week">Week</button>
            <button class="cal-tab px-4 py-1.5 text-xs font-bold rounded-md transition-all text-muted hover:text-white active:bg-white active:text-zinc-950" data-view="day">Day</button>
        </div>

        <button class="btn-primary" id="add-event-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
            New Block
        </button>
    </div>
  </div>

  <!-- Main Calendar Container -->
  <div class="flex-1 flex flex-col md:flex-row gap-6 overflow-hidden">
    
    <!-- Left: Calendar Grid -->
    <div class="flex-1 bg-card border border-border rounded-2xl overflow-hidden flex flex-col">
        <div id="calendar-grid" class="grid grid-cols-7 flex-1 overflow-y-auto">
            <!-- JS injects cells here -->
        </div>
    </div>

    <!-- Right: Sidebar (Unscheduled Tasks) -->
    <div class="w-full md:w-80 shrink-0 flex flex-col gap-4 overflow-hidden">
        <div class="card p-4 flex flex-col h-full">
            <h3 class="font-bold text-zinc-100 flex items-center gap-2 mb-4">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                Focus List
            </h3>
            <p class="text-[10px] text-muted uppercase tracking-widest mb-4">Drag to schedule</p>
            
            <div id="cal-task-list" class="flex-1 overflow-y-auto space-y-2 pr-1">
                <!-- JS injects tasks here -->
            </div>

            <!-- Mini Drop Info -->
            <div class="mt-4 p-3 rounded-lg border border-dashed border-white/5 bg-white/[0.02] text-center">
                <p class="text-[10px] text-muted italic">Drop tasks onto time slots to create blocks</p>
            </div>
        </div>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div id="modal-event" class="modal-overlay">
  <div class="modal-box">
    <div class="p-6 border-b border-white/5 flex items-center justify-between">
      <h2 class="font-semibold text-zinc-100" id="event-modal-title">New Block</h2>
      <button type="button" class="btn-icon" id="modal-event-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
      </button>
    </div>
    <form id="event-form" class="p-6 space-y-4">
      <input type="hidden" id="event-id" />
      <div>
        <label class="label" for="event-title">Event Title</label>
        <input type="text" id="event-title" class="input" placeholder="Deep Work, Meeting, etc." required />
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label" for="event-type">Type</label>
          <select id="event-type" class="select">
            <option value="focus">Focus Block</option>
            <option value="meeting">Meeting</option>
            <option value="wellness">Wellness</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label class="label" for="event-date">Date</label>
          <input type="date" id="event-date" class="input [color-scheme:dark]" required />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label" for="event-start">Start Time</label>
          <input type="time" id="event-start" class="input [color-scheme:dark]" required />
        </div>
        <div>
          <label class="label" for="event-end">End Time</label>
          <input type="time" id="event-end" class="input [color-scheme:dark]" required />
        </div>
      </div>

      <div class="flex items-center gap-3 pt-2">
        <button type="button" class="btn-secondary flex-1" id="modal-event-delete">Delete</button>
        <button type="submit" class="btn-primary flex-1">Save Block</button>
      </div>
    </form>
  </div>
</div>

<style>
    .cal-tab.active {
        background: white;
        color: #09090b;
        box-shadow: 0 4px 12px rgba(255,255,255,0.1);
    }
    .cal-event-container::-webkit-scrollbar {
        width: 3px;
    }
    .cal-event-container::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
    }
</style>
