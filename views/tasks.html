<div class="p-6 max-w-screen-2xl mx-auto">
  <!-- Header Row -->
  <div class="mb-10 flex items-center justify-between">
    <div>
      <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-zinc-100">
        Focus List
      </h1>
      <p class="text-base text-muted mt-2 max-w-2xl">
        Track and ship your daily priorities with precision.
      </p>
    </div>
    <button class="btn-primary" id="add-task-btn">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      New Task
    </button>
  </div>

  <!-- Full-Width Search Bar -->
  <div class="mb-4">
    <div class="relative w-full">
      <svg
        class="absolute left-4 top-1/2 -translate-y-1/2 text-muted"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input
        type="text"
        id="task-search-input"
        placeholder="Search focused tasks…"
        class="input pl-11 py-3.5 text-base shadow-sm"
      />
    </div>
  </div>

  <!-- Dedicated Filter Row -->
  <div class="flex items-center justify-between mb-8">
    <div
      class="flex bg-card border border-border rounded-lg p-1 gap-1"
      id="task-filters"
    >
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
    </div>
    <button
      class="btn-ghost text-xs text-muted hover:text-red-400 font-medium"
      id="clear-completed-btn"
    >
      Clear completed
    </button>
  </div>

  <!-- Task List -->
  <div id="task-list" class="space-y-2">
    <!-- JS injects tasks here -->
  </div>

  <!-- Empty State -->
  <div
    id="tasks-empty-state"
    class="hidden py-20 flex flex-col items-center text-center"
  >
    <div
      class="w-16 h-16 rounded-xl bg-card border border-border flex items-center justify-center text-muted mb-4"
    >
      <svg
        width="28"
        height="28"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path d="M9 11l3 3L22 4" />
        <path
          d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"
        />
      </svg>
    </div>
    <p class="font-semibold text-zinc-300 mb-1">All clear.</p>
    <p class="text-sm text-muted">
      Add a task to start building momentum.
    </p>
  </div>
</div>

<!-- Task Modal (Moved to fragment for modularity) -->
<div id="modal-task" class="modal-overlay">
  <div class="modal-box">
    <div
      class="p-6 border-b border-border flex items-center justify-between"
    >
      <h2 class="font-semibold text-zinc-100" id="modal-title">New Task</h2>
      <button type="button" class="btn-icon" id="modal-task-close">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <form id="task-form" class="p-6 space-y-4">
      <input type="hidden" id="task-id" />
      <div>
        <label class="label" for="task-title-input">Task title</label>
        <input
          type="text"
          id="task-title-input"
          class="input"
          placeholder="What needs to be done?"
          required
        />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label" for="task-priority-input">Priority</label>
          <select id="task-priority-input" class="select">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div>
          <label class="label" for="task-date">Due date</label>
          <input
            type="date"
            id="task-date"
            class="input [color-scheme:dark]"
          />
        </div>
      </div>
      <div class="flex items-center gap-3 pt-2">
        <button
          type="button"
          class="btn-secondary flex-1"
          id="modal-task-cancel"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="btn-primary flex-1"
          id="task-submit-btn"
        >
          Save Task
        </button>
      </div>
    </form>
  </div>
</div>
