<div class="p-6 max-w-screen-2xl mx-auto">
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-zinc-100">
      Deep Work
    </h1>
    <p class="text-base text-muted mt-2 max-w-2xl">
      Block out distractions and build consistent momentum.
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Timer Card -->
    <div
      class="card flex flex-col items-center justify-center gap-8 py-16"
    >
      <!-- Ring -->
      <div
        class="relative w-56 h-56 flex items-center justify-center"
      >
        <svg
          class="absolute inset-0 w-full h-full -rotate-90"
          viewBox="0 0 240 240"
        >
          <circle
            class="text-zinc-800"
            stroke-width="8"
            stroke="currentColor"
            fill="none"
            r="105"
            cx="120"
            cy="120"
          />
          <circle
            class="text-zinc-100 transition-all duration-300"
            stroke-width="8"
            stroke-dasharray="659.7"
            stroke-dashoffset="659.7"
            stroke-linecap="round"
            stroke="currentColor"
            fill="none"
            r="105"
            cx="120"
            cy="120"
            id="timer-progress-ring"
          />
        </svg>
        <div class="text-center">
          <p
            class="text-4xl font-bold font-mono tracking-tighter text-zinc-100"
          >
            <span id="timer-hours">00</span>:<span id="timer-minutes"
              >00</span
            >:<span id="timer-seconds">00</span>
          </p>
          <p
            class="text-[11px] font-semibold uppercase tracking-widest text-muted mt-2"
            id="timer-label"
          >
            Ready
          </p>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-4">
        <button class="btn-icon p-3" id="timer-reset-btn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"
            />
            <polyline points="3 3 3 8 8 8" />
          </svg>
        </button>
        <button
          class="btn-primary w-16 h-16 rounded-full text-lg shadow-lg"
          id="timer-start-btn"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>
        <button class="btn-icon p-3" id="timer-lap-btn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Session History -->
    <div class="card flex flex-col">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-zinc-100">Session History</h3>
        <button
          class="btn-ghost text-xs hover:text-red-400"
          id="clear-sessions-btn"
        >
          Clear all
        </button>
      </div>
      <div
        id="session-list"
        class="flex-1 space-y-2 overflow-y-auto max-h-[480px] pr-1"
      >
        <!-- JS injects sessions here -->
      </div>
    </div>
  </div>
</div>
