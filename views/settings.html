<div class="p-6 max-w-screen-2xl mx-auto">
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-zinc-100">
      Settings
    </h1>
    <p class="text-base text-muted mt-2 max-w-2xl">
      Configure your workspace and local storage preferences.
    </p>
  </div>

  <div class="space-y-4">
    <!-- Profile -->
    <div class="card">
      <h3 class="font-semibold text-zinc-100 mb-5">Profile</h3>
      <div>
        <label class="label" for="settings-name">Display Name</label>
        <input
          type="text"
          id="settings-name"
          class="input"
          placeholder="Your name"
          value="User"
        />
      </div>
    </div>

    <!-- Preferences -->
    <div class="card">
      <h3 class="font-semibold text-zinc-100 mb-5">Preferences</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="label" for="settings-currency"
            >Currency</label
          >
          <select id="settings-currency" class="select">
            <option value="SAR">SAR — Saudi Riyal</option>
            <option value="USD">USD — US Dollar</option>
          </select>
        </div>
        <div>
          <label class="label" for="settings-theme">Theme</label>
          <select id="settings-theme" class="select">
            <option value="dark" selected>Dark</option>
            <option value="light">Light (coming soon)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Data Sync -->
    <div class="card">
      <h3 class="font-semibold text-zinc-100 mb-2">Automated Data Sync</h3>
      <p class="text-sm text-muted mb-6">
        Sync your portfolio with a remote TradingView bridge or custom endpoint.
      </p>
      
      <div class="space-y-4">
        <div>
          <label class="label" for="settings-sync-url">Remote Source URL</label>
          <input
            type="url"
            id="settings-sync-url"
            class="input"
            placeholder="https://your-site.com/api/trades"
          />
        </div>
        
        <div>
          <label class="label" for="settings-sync-headers">Custom Headers (JSON)</label>
          <textarea
            id="settings-sync-headers"
            class="input h-20 font-mono text-xs"
            placeholder='{ "Authorization": "Bearer your-token-here" }'
          ></textarea>
        </div>
      </div>
    </div>

    <!-- Data -->
    <div class="card">
      <h3 class="font-semibold text-zinc-100 mb-2">Data</h3>
      <p class="text-sm text-muted mb-5">
        All data lives in your browser's local storage.
      </p>
      <div class="flex flex-wrap gap-3">
        <button class="btn-secondary" id="export-data-btn">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Export Backup
        </button>
        <button
          class="btn-secondary text-red-400 border-red-500/20 hover:bg-red-500/10 hover:border-red-500/30"
          id="clear-data-btn"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="3 6 5 6 21 6" />
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            />
          </svg>
          Clear All Data
        </button>
      </div>
    </div>

    <!-- Save -->
    <div class="flex justify-end pt-2">
      <button class="btn-primary px-8 py-2.5" id="save-settings-btn">
        Save Settings
      </button>
    </div>
  </div>
</div>
