<div class="p-6 max-w-screen-2xl mx-auto">
  <!-- Header Row -->
  <div class="mb-10 flex items-center justify-between">
    <div>
      <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-zinc-100">
        Routines
      </h1>
      <p class="text-base text-muted mt-2 max-w-2xl">
        Ship your daily priorities and build momentum through consistency.
      </p>
    </div>
  </div>

  <!-- ═══ MAIN GRID ═══ -->
  <div class="grid grid-cols-1 xl:grid-cols-2 gap-8 items-start">
    
    <!-- ═══ LEFT COLUMN: FOCUS LIST ═══ -->
    <div class="flex flex-col space-y-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-2xl font-bold text-zinc-100">Focus List</h2>
        <button class="btn-primary" id="add-task-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
          New Task
        </button>
      </div>

      <!-- Search Bar -->
      <div class="relative w-full">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
        <input type="text" id="task-search-input" placeholder="Search focused tasks…" class="input pl-11 py-3.5 text-base shadow-sm" />
      </div>

      <!-- Filter Row -->
      <div class="flex items-center justify-between mt-2 mb-2">
        <div class="flex bg-card border border-border rounded-lg p-1 gap-1" id="task-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Done</button>
        </div>
        <button class="btn-ghost text-xs text-muted hover:text-red-400 font-medium" id="clear-completed-btn">
          Clear completed
        </button>
      </div>

      <!-- Task List Container -->
      <div id="task-list" class="space-y-2">
        <!-- JS injects tasks here -->
      </div>

      <!-- Skeleton Loader -->
      <div id="tasks-skeleton" class="space-y-2 hidden">
        <div class="task-item animate-pulse">
          <div class="w-5 h-5 rounded border border-white/5 bg-white/5"></div>
          <div class="flex-1 min-w-0 space-y-2 ml-2">
            <div class="w-1/3 h-4 bg-white/10 rounded"></div>
            <div class="w-16 h-3 bg-white/5 rounded"></div>
          </div>
          <div class="w-12 h-5 rounded-md bg-white/5"></div>
        </div>
        <div class="task-item animate-pulse" style="animation-delay: 75ms">
          <div class="w-5 h-5 rounded border border-white/5 bg-white/5"></div>
          <div class="flex-1 min-w-0 space-y-2 ml-2">
            <div class="w-1/2 h-4 bg-white/10 rounded"></div>
            <div class="w-20 h-3 bg-white/5 rounded"></div>
          </div>
          <div class="w-12 h-5 rounded-md bg-white/5"></div>
        </div>
        <div class="task-item animate-pulse" style="animation-delay: 150ms">
          <div class="w-5 h-5 rounded border border-white/5 bg-white/5"></div>
          <div class="flex-1 min-w-0 space-y-2 ml-2">
            <div class="w-1/4 h-4 bg-white/10 rounded"></div>
            <div class="w-12 h-3 bg-white/5 rounded"></div>
          </div>
          <div class="w-12 h-5 rounded-md bg-white/5"></div>
        </div>
      </div>

      <!-- Empty State -->
      <div id="tasks-empty-state" class="hidden py-20 flex flex-col items-center text-center">
        <div class="w-16 h-16 rounded-xl bg-card border border-border flex items-center justify-center text-muted mb-4">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></svg>
        </div>
        <p class="font-semibold text-zinc-300 mb-1">All clear.</p>
        <p class="text-sm text-muted">Add a task to start building momentum.</p>
      </div>
    </div>

    <!-- ═══ RIGHT COLUMN: CONSISTENCY CANVAS (HABITS) ═══ -->
    <div class="flex flex-col space-y-6">
      <div class="flex items-center justify-between mb-0">
        <h2 class="text-2xl font-bold text-zinc-100">Consistency Canvas</h2>
      </div>

      <!-- Stats Row -->
      <div class="grid grid-cols-3 gap-4">
        <div class="card flex flex-col gap-1 items-center py-5">
          <p class="text-3xl font-bold text-emerald-400 font-mono" id="streak-current">0</p>
          <p class="label">Current Streak</p>
        </div>
        <div class="card flex flex-col gap-1 items-center py-5">
          <p class="text-3xl font-bold text-violet-400 font-mono" id="streak-longest">0</p>
          <p class="label">Longest Streak</p>
        </div>
        <div class="card flex flex-col gap-1 items-center py-5">
          <p class="text-3xl font-bold text-sky-400 font-mono" id="streak-total">0</p>
          <p class="label">Active Days</p>
        </div>
      </div>

      <!-- Today's Rituals -->
      <div class="card flex flex-col">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold text-zinc-100 flex items-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Today's Rituals
          </h3>
          <span class="text-xs text-muted font-mono" id="rituals-counter">0/0</span>
        </div>

        <!-- Progress Bar -->
        <div class="w-full h-1.5 bg-zinc-800 rounded-full mb-4 overflow-hidden">
          <div id="rituals-progress" class="h-full bg-emerald-400 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Rituals List -->
        <div id="rituals-list" class="space-y-2 flex-1">
          <!-- JS injects ritual items -->
        </div>

        <!-- Add Custom Ritual -->
        <div class="mt-4 pt-4 border-t border-white/5 flex gap-2">
          <input type="text" id="new-ritual-input" class="input flex-1 text-sm" placeholder="Add a ritual...">
          <button class="btn-primary px-3 py-2 text-sm" id="add-ritual-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
          </button>
        </div>
      </div>

      <!-- Heatmap -->
      <div class="card">
        <h3 class="font-semibold text-zinc-100 mb-4 flex items-center gap-2">
          Activity Grid
        </h3>
        <div id="heatmap-grid" class="heatmap-container overflow-x-auto pb-2">
          <!-- JS renders heatmap -->
        </div>
        <!-- Intensity Legend -->
        <div class="flex items-center justify-end gap-2 mt-3 text-[10px] text-zinc-500">
          <span>Less</span>
          <div class="heatmap-cell" data-level="0" style="width:12px;height:12px"></div>
          <div class="heatmap-cell" data-level="1" style="width:12px;height:12px"></div>
          <div class="heatmap-cell" data-level="2" style="width:12px;height:12px"></div>
          <div class="heatmap-cell" data-level="3" style="width:12px;height:12px"></div>
          <div class="heatmap-cell" data-level="4" style="width:12px;height:12px"></div>
          <span>More</span>
        </div>
      </div>

      <!-- 7-Day History -->
      <div class="card">
        <h3 class="font-semibold text-zinc-100 mb-4">Weekly Overview</h3>
        <div id="ritual-history" class="flex items-end justify-between gap-2 h-32">
          <!-- JS renders 7-day bar chart -->
        </div>
      </div>

    </div> <!-- End Right Column -->

  </div> <!-- End Grid -->
</div>

<!-- Task Modal (Carried over from tasks.html) -->
<div id="modal-task" class="modal-overlay">
  <div class="modal-box">
    <div class="p-6 border-b border-white/5 flex items-center justify-between">
      <h2 class="font-semibold text-zinc-100" id="modal-title">New Task</h2>
      <button type="button" class="btn-icon" id="modal-task-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
      </button>
    </div>
    <form id="task-form" class="p-6 space-y-4">
      <input type="hidden" id="task-id" />
      <div>
        <label class="label" for="task-title-input">Task title</label>
        <input type="text" id="task-title-input" class="input" placeholder="What needs to be done?" required />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label" for="task-priority-input">Priority</label>
          <select id="task-priority-input" class="select">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div>
          <label class="label" for="task-date">Due date</label>
          <input type="date" id="task-date" class="input [color-scheme:dark]" />
        </div>
      </div>
      <div class="flex items-center gap-3 pt-2">
        <button type="button" class="btn-secondary flex-1" id="modal-task-cancel">Cancel</button>
        <button type="submit" class="btn-primary flex-1" id="task-submit-btn">Save Task</button>
      </div>
    </form>
  </div>
</div>
