<div class="p-6 max-w-screen-2xl mx-auto">
  <div class="mb-10">
    <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-zinc-100">
      Deep Work
    </h1>
    <p class="text-base text-muted mt-2 max-w-2xl">
      Block out distractions and build consistent momentum.
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Timer Card -->
    <div class="card flex flex-col items-center justify-center gap-6 py-12">

      <!-- Mode Selector Pills -->
      <div class="flex flex-wrap items-center justify-center gap-2 mb-2">
        <button class="mode-pill" data-mode="stopwatch">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Free
        </button>
        <button class="mode-pill" data-mode="focus">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          25m
        </button>
        <button class="mode-pill" data-mode="short_break">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          5m
        </button>
        <button class="mode-pill" data-mode="long_break">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          15m
        </button>
      </div>

      <!-- Pomodoro Cycle Dots -->
      <div class="flex items-center gap-2" id="pomodoro-dots">
        <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
        <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
        <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
        <div class="w-2 h-2 rounded-full bg-zinc-700"></div>
      </div>

      <!-- Ring -->
      <div class="relative w-56 h-56 flex items-center justify-center">
        <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 240 240">
          <circle
            class="text-zinc-800"
            stroke-width="8"
            stroke="currentColor"
            fill="none"
            r="105" cx="120" cy="120"
          />
          <circle
            class="transition-all duration-300"
            stroke-width="8"
            stroke-dasharray="659.7"
            stroke-dashoffset="659.7"
            stroke-linecap="round"
            stroke="#e4e4e7"
            fill="none"
            r="105" cx="120" cy="120"
            id="timer-progress-ring"
          />
        </svg>
        <div class="text-center">
          <p class="text-4xl font-bold font-mono tracking-tighter text-zinc-100">
            <span id="timer-hours">00</span>:<span id="timer-minutes">00</span>:<span id="timer-seconds">00</span>
          </p>
          <p class="text-[11px] font-semibold uppercase tracking-widest text-muted mt-2" id="timer-label">
            Ready
          </p>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-4">
        <button class="btn-icon p-3" id="timer-reset-btn" title="Reset">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <polyline points="3 3 3 8 8 8" />
          </svg>
        </button>
        <button class="btn-primary w-16 h-16 rounded-full text-lg shadow-lg" id="timer-start-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>
        <button class="btn-icon p-3" id="timer-skip-btn" title="Skip to next phase" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 4 15 12 5 20 5 4" fill="currentColor"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <button class="btn-icon p-3" id="timer-lap-btn" title="Save lap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>

      <!-- Zen Mode Trigger -->
      <button class="btn-ghost text-xs flex items-center gap-2 mt-2 opacity-60 hover:opacity-100 transition-opacity" id="zen-mode-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
        </svg>
        Enter Zen Mode
      </button>
    </div>

    <!-- Right Column -->
    <div class="flex flex-col gap-6">

      <!-- Ambient Soundscapes -->
      <div class="card">
        <h3 class="font-semibold text-zinc-100 mb-4">Ambient Soundscapes</h3>
        <div class="grid grid-cols-4 gap-2 mb-4">
          <button class="sound-btn" data-sound="rain">
            <span class="text-lg">🌧️</span>
            <span class="text-[10px] text-muted">Rain</span>
          </button>
          <button class="sound-btn" data-sound="storm">
            <span class="text-lg">⛈️</span>
            <span class="text-[10px] text-muted">Storm</span>
          </button>
          <button class="sound-btn" data-sound="fire">
            <span class="text-lg">🔥</span>
            <span class="text-[10px] text-muted">Fire</span>
          </button>
          <button class="sound-btn" data-sound="forest">
            <span class="text-lg">🌲</span>
            <span class="text-[10px] text-muted">Forest</span>
          </button>
        </div>
        <div class="flex items-center gap-3">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-muted flex-shrink-0">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          </svg>
          <input type="range" min="0" max="1" step="0.05" value="0.5" id="ambient-volume"
            class="w-full h-1 bg-zinc-700 rounded-lg appearance-none cursor-pointer accent-emerald-400">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-muted flex-shrink-0">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </div>
      </div>

      <!-- Session History -->
      <div class="card flex flex-col flex-1">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-semibold text-zinc-100">Session History</h3>
          <button class="btn-ghost text-xs hover:text-red-400" id="clear-sessions-btn">
            Clear all
          </button>
        </div>
        <div id="session-list" class="flex-1 space-y-2 overflow-y-auto max-h-[360px] pr-1">
          <!-- JS injects sessions here -->
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ─── Zen Mode Overlay ───────────────────────────────────────────── -->
<div id="zen-overlay" class="zen-overlay">
  <div class="zen-content">
    <button class="zen-close-btn" id="zen-close-btn" title="Exit Zen Mode (Esc)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <p class="text-[11px] font-semibold uppercase tracking-[0.3em] text-zinc-500 mb-4" id="zen-timer-label">Focus</p>

    <p class="zen-time" id="zen-timer-display">00:00:00</p>

    <div class="zen-breathing-ring"></div>

    <button class="btn-ghost text-sm mt-10 text-zinc-400 hover:text-zinc-100" id="zen-pause-btn">
      Pause
    </button>
  </div>
</div>
